<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flag Football Route Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a4a1a 0%, #2d7a2d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(0,0,0,0.75);
            border-radius: 16px;
            padding: 32px;
            max-width: 780px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        /* Welcome */
        #welcome-screen { text-align: center; }

        .title {
            font-size: 2.6em;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 1.1em;
            color: #ccc;
            margin-bottom: 10px;
        }

        .welcome-info {
            color: #aaa;
            font-size: 0.95em;
            margin-bottom: 32px;
        }

        .start-btn {
            background: #ffd700;
            color: #1a4a1a;
            border: none;
            padding: 15px 44px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .start-btn:hover {
            background: #ffe84a;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(255,215,0,0.35);
        }

        /* Quiz */
        #quiz-screen { display: none; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .question-counter { color: #aaa; font-size: 0.9em; }
        .score-display { color: #ffd700; font-weight: bold; font-size: 1em; }

        .progress-bar-container {
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            height: 7px;
            margin-bottom: 20px;
        }

        .progress-bar {
            background: #ffd700;
            height: 100%;
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .play-label {
            display: inline-block;
            background: #ffd700;
            color: #1a4a1a;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.82em;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .play-title {
            font-size: 2.2em;
            font-weight: 900;
            color: #ffd700;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
            margin-bottom: 12px;
            text-align: center;
        }

        .image-reveal-label {
            font-size: 0.78em;
            color: #aaa;
            text-align: center;
            margin-top: 6px;
            font-style: italic;
            display: none;
        }

        .question-text {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 18px;
            line-height: 1.45;
            color: #f0f0f0;
        }

        .play-image-container {
            margin-bottom: 18px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(255,215,0,0.25);
        }

        .play-image { width: 100%; height: auto; display: block; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .option-btn {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.18);
            color: white;
            padding: 13px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            text-align: left;
            transition: all 0.2s;
            line-height: 1.35;
        }

        .option-btn:hover:not(:disabled) {
            background: rgba(255,215,0,0.15);
            border-color: #ffd700;
            transform: translateY(-1px);
        }

        .option-btn.correct {
            background: rgba(0,200,80,0.25);
            border-color: #00c850;
            color: #afffcc;
        }

        .option-btn.wrong {
            background: rgba(220,50,50,0.25);
            border-color: #dc3232;
            color: #ffbbbb;
        }

        .option-btn:disabled { cursor: default; }

        .feedback {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 14px;
            font-size: 0.92em;
            line-height: 1.4;
            display: none;
        }

        .feedback.correct {
            background: rgba(0,200,80,0.15);
            border: 1px solid #00c850;
            color: #afffcc;
        }

        .feedback.wrong {
            background: rgba(220,50,50,0.15);
            border: 1px solid #dc3232;
            color: #ffbbbb;
        }

        .next-btn {
            background: #ffd700;
            color: #1a4a1a;
            border: none;
            padding: 12px 0;
            font-size: 1em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
            width: 100%;
        }

        .next-btn:hover { background: #ffe84a; }

        /* Results */
        #results-screen { display: none; text-align: center; }

        .results-emoji { font-size: 3.8em; margin-bottom: 8px; }
        .results-title { font-size: 2em; color: #ffd700; font-weight: bold; margin-bottom: 6px; }
        .results-score { font-size: 3.2em; font-weight: bold; color: white; margin: 16px 0; }
        .results-message { color: #ccc; font-size: 1.05em; margin-bottom: 24px; }

        .results-breakdown {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 24px;
            text-align: left;
        }

        .breakdown-title { color: #ffd700; font-weight: bold; margin-bottom: 12px; font-size: 0.95em; }

        .breakdown-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-size: 0.92em;
            color: #ddd;
        }

        .breakdown-item:last-child { border-bottom: none; }
        .bd-correct { color: #7fffb0; font-weight: bold; }
        .bd-wrong { color: #ffaaaa; font-weight: bold; }

        .restart-btn {
            background: #ffd700;
            color: #1a4a1a;
            border: none;
            padding: 14px 42px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .restart-btn:hover {
            background: #ffe84a;
            transform: translateY(-2px);
        }
    </style>
</head>

        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = `${String.fromCharCode(65 + i)}. ${opt}`;
            btn.onclick = () => selectAnswer(i);
            grid.appendChild(btn);
        });

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function selectAnswer(idx) {
        if (answered) return;
        answered = true;

        const q = questions[currentQuestion];
        const buttons = document.querySelectorAll('.option-btn');
        const feedback = document.getElementById('feedback');

        buttons.forEach(b => b.disabled = true);
        buttons[q.answer].classList.add('correct');

        // Swap to full route image after answering (if question has an image)
        if (!q.noImage) {
            document.getElementById('play-image').src = q.image;
            document.getElementById('image-reveal-label').style.display = 'block';
        }

        // Always reveal play identity after answering
        document.getElementById('play-title').textContent = q.play.toUpperCase();
        document.getElementById('play-label').textContent = q.play;
        document.getElementById('play-title').style.visibility = 'visible';
        document.getElementById('play-label').style.visibility = 'visible';

        if (idx === q.answer) {
            score++;
            document.getElementById('score').textContent = score;
            feedback.className = 'feedback correct';
            feedback.innerHTML = `✅ <strong>Correct!</strong> ${q.explanation}`;
            answerRecord.push({ play: q.play, correct: true });
        } else {
            buttons[idx].classList.add('wrong');
            feedback.className = 'feedback wrong';
            feedback.innerHTML = `❌ <strong>Not quite.</strong> ${q.explanation}`;
            answerRecord.push({ play: q.play, correct: false });
        }

        feedback.style.display = 'block';
        const nextBtn = document.getElementById('next-btn');
        nextBtn.textContent = currentQuestion < questions.length - 1 ? 'Next Question →' : 'See Results 🏆';
        nextBtn.style.display = 'block';
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('results-screen').style.display = 'block';
        document.getElementById('progress-bar').style.width = '100%';

        const pct = Math.round((score / questions.length) * 100);
        document.getElementById('results-score').textContent = `${score} / ${questions.length}`;

        let emoji, msg;
        if (pct === 100) { emoji = '🏆'; msg = "Perfect score! You know these plays inside and out!"; }
        else if (pct >= 75) { emoji = '🎉'; msg = "Great job! You've got a solid grasp of the playbook."; }
        else if (pct >= 50) { emoji = '👍'; msg = "Not bad! A bit more review and you'll have these locked in."; }
        else               { emoji = '📋'; msg = "Keep studying — you'll get there!"; }

        document.getElementById('results-emoji').textContent = emoji;
        document.getElementById('results-message').textContent = msg;

        const playScores = { 'Play A': {c:0,t:0}, 'Play B': {c:0,t:0}, 'Play C': {c:0,t:0} };
        questions.forEach((q, i) => {
            playScores[q.play].t++;
            if (answerRecord[i] && answerRecord[i].correct) playScores[q.play].c++;
        });

        let html = '<div class="breakdown-title">Results by Play</div>';
        Object.entries(playScores).forEach(([play, d]) => {
            const p = Math.round((d.c / d.t) * 100);
            const cls = p >= 75 ? 'bd-correct' : 'bd-wrong';
            html += `<div class="breakdown-item"><span>${play}</span><span class="${cls}">${d.c}/${d.t} (${p}%)</span></div>`;
        });
        document.getElementById('results-breakdown').innerHTML = html;
    }

    function restartQuiz() {
        currentQuestion = 0; score = 0; answered = false; answerRecord = [];
        shuffle(questions);
        document.getElementById('results-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        loadQuestion();
    }
</script>
</body>
</html>
